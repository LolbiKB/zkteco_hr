name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=15
      redis-cache:
        image: redis:6.2-alpine
        ports: ["13000:6379"]
      redis-queue:
        image: redis:6.2-alpine
        ports: ["11000:6379"]

    env:
      # Must match the Frappe Cloud site's major version (prod runs v16 —
      # frappe/erpnext 16.x, hrms 16.x). Bump here whenever prod moves tracks;
      # testing against a different major makes engine behaviour untrustworthy.
      FRAPPE_BRANCH: version-16
      ERPNEXT_BRANCH: version-16
      HRMS_BRANCH: version-16
      DB_ROOT_PASSWORD: root

    steps:
      - name: Checkout zkteco_hr
        uses: actions/checkout@v4
        with:
          path: zkteco_hr-src

      - uses: actions/setup-python@v5
        with:
          # frappe 16.23 (prod's version) pins Python >=3.14,<3.15 in its pyproject —
          # the bench env must be 3.14, or `uv pip install -e frappe` won't resolve.
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          # frappe v16 requires Node >=24 (bench init runs `yarn install`, whose
          # engine check rejects older Node). Keep in step with FRAPPE_BRANCH.
          node-version: "24"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mariadb-client

      - name: Install frappe-bench
        run: pip install frappe-bench

      - name: Init bench + fetch apps (frappe → erpnext → hrms → zkteco_hr)
        run: |
          bench init --skip-redis-config-generation --skip-assets \
            --frappe-branch "$FRAPPE_BRANCH" --python "$(which python)" frappe-bench
          cd frappe-bench
          # --skip-assets: zkteco_hr ships pre-built committed assets (Frappe
          # Cloud never builds them), and backend tests need no frontend build.
          bench get-app erpnext --branch "$ERPNEXT_BRANCH" --skip-assets
          bench get-app hrms --branch "$HRMS_BRANCH" --skip-assets
          bench get-app zkteco_hr "$GITHUB_WORKSPACE/zkteco_hr-src" --skip-assets
          # zkteco_hr's nested package layout (zkteco_hr/zkteco_hr/) can skip
          # apps.txt auto-registration; ensure it's listed before install.
          # Force a trailing newline first — apps.txt may lack one, else the
          # append concatenates onto the last app (-> 'hrmszkteco_hr').
          [ -s sites/apps.txt ] && [ -n "$(tail -c1 sites/apps.txt)" ] && echo >> sites/apps.txt
          grep -qxF zkteco_hr sites/apps.txt 2>/dev/null || echo zkteco_hr >> sites/apps.txt

      - name: MariaDB charset (utf8mb4)
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p"$DB_ROOT_PASSWORD" \
            -e "SET GLOBAL character_set_server='utf8mb4'; SET GLOBAL collation_server='utf8mb4_unicode_ci';"

      - name: Create site + install apps
        working-directory: frappe-bench
        run: |
          bench set-config -g db_host 127.0.0.1
          bench set-config -g redis_cache "redis://127.0.0.1:13000"
          bench set-config -g redis_queue "redis://127.0.0.1:11000"
          bench set-config -g redis_socketio "redis://127.0.0.1:11000"
          bench new-site test_site \
            --no-mariadb-socket \
            --db-host 127.0.0.1 \
            --mariadb-root-password "$DB_ROOT_PASSWORD" \
            --admin-password admin
          bench --site test_site install-app erpnext hrms zkteco_hr
          bench --site test_site set-config allow_tests true

      - name: Run zkteco_hr tests
        working-directory: frappe-bench
        run: bench --site test_site run-tests --app zkteco_hr
